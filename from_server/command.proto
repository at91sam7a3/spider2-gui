syntax = "proto2";
package Command;

message MoveCommand{
    required float forwardSpeed = 1;
    required float strafeSpeed = 2;
    required float rotationSpeed = 3;
}


message TelemetryUpdate{
    required string name = 1;
    oneof value {
        float fvalue = 2;
        string svalue = 3;
        bool bvalue = 4;
        int32 ivalue = 5;
    }
}

message LidarData{
    required int64 timestamp = 1;
    repeated float angles = 2 [packed=true];      // 16 angle readings in radians
    repeated float distances = 3 [packed=true];   // 16 distance readings in meters
}

message GyroData{
    required int64 timestamp = 1;
    required float x = 2;    // X-axis angular velocity in rad/s
    required float y = 3;    // Y-axis angular velocity in rad/s
}

message Heartbeat{
    required int64 timestamp = 1;
    optional string client_id = 2;
}

message HeightCommand{
    required float height = 1;
}

message WalkingStyleCommand{
    required int32 style = 1;  // 1, 2, or 3
}

message ServoTorqueCommand{
    required bool enabled = 1;  // true = load (torque on), false = unload (torque off)
}

message VideoFrame{
    required int64 timestamp = 1;
    required bytes data = 2;          // JPEG-encoded frame data
    required int32 width = 3;
    required int32 height = 4;
}

message SlamPose{
    required int64 timestamp = 1;
    required double x_mm = 2;         // X position in millimeters
    required double y_mm = 3;         // Y position in millimeters
    required double theta_deg = 4;    // Orientation in degrees
}

message SlamMap{
    required int64 timestamp = 1;
    required int32 size_pixels = 2;   // Map size (square)
    required double size_meters = 3;  // Physical size in meters
    required bytes data = 4;          // Map pixel data (size_pixels^2 bytes)
}

message MoveToPointCommand{
    required float target_x_mm = 1;
    required float target_y_mm = 2;
    optional float tolerance_mm = 3 [default = 50.0];
}

message RobotStateChange{
    required string state = 1;  // "manual_control" or "move_to_point"
}

message BlobTrackingCommand{
    required bool enabled = 1;
}

message BlobTrackingData{
    required int64 timestamp = 1;
    required float blob_x = 2;       // normalized x center (-1 left, +1 right)
    required float blob_y = 3;       // normalized y center (-1 top, +1 bottom)
    required float blob_size = 4;    // relative area (0.0 to 1.0)
    required int32 frame_width = 5;
    required int32 frame_height = 6;
}

message TrajectoryCommand{
    required int32 type = 1;  // 0 = LinearSine (default), 1 = Cycloid
}

message PitchCommand{
    required float angle_deg = 1;  // degrees, range: -10.0 to 10.0
}

message RollCommand{
    required float angle_deg = 1;  // degrees, range: -10.0 to 10.0
}
